<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineKids DevSys</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

    <style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Fredoka One', sans-serif;
    overflow: hidden;

    background-image: url('https://i.pinimg.com/1200x/52/f8/a0/52f8a00b35e90538a7a789d35a0aed47.jpg');
    background-size: cover;     
    background-position: center; 
    background-repeat: no-repeat;
}


        .title {
            font-family: 'Fredoka One', sans-serif;
            font-size: 90px;
            text-align: center;
            color: #FFCC00;
            text-shadow: 4px 4px #6EC9FF;
            margin-bottom: -20px;
        }

        .subtitle {
            font-family: 'Fredoka One', sans-serif;
            font-size: 60px;
            text-align: center;
            color: #FFCC00;
            text-shadow: 4px 4px #6EC9FF;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn {
            background-color: #8ED8EA;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            font-family:  'Fredoka One', sans-serif;
        }

        .btn:hover {
            transform: scale(1.08);
        }

        img {
            position: absolute;
        }

        .popL {
            width: 160px;
            bottom: 90px;
            left: 40px;
        }

        .popR {
            width: 160px;
            bottom: 90px;
            right: 40px;
        }

        .cloud {
            width: 200px;
            top: 50px;
            left: 40px;
        }

        .cloud2 {
            width: 200px;
            top: 60px;
            right: 40px;
        }
    </style>

</head>

<body>

    <div class="container">
        <h1 class="title">CineKids</h1>
        <h2 class="subtitle">DevSys</h2>
        <a href="/index.html">
            <button class="btn" >Entrar</button>
        </a>
    </div>

    

</body>

<link rel="stylesheet" href="/index.html">

</html>
