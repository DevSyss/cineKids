<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta viewport="width=device-width, initial-scale=1.0">
    <title>Edição de Gênero</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/cadastroGenero.css">
</head>
<body>

    <div class="card">
        <h2>Editar Gênero</h2>

        <form id="formGenero">
            <label>Gênero</label>
            <input type="text" id="nomeGenero" placeholder="Ex: Ação, Drama..." required>

            <label>Descrição</label>
            <textarea id="descricao" rows="4"></textarea>

            <div class="btn-area">
                <button type="reset" class="cancelar">Cancelar</button>

                <button type="submit" class="salvar">Salvar</button>
            </div>

            <p id="mensagem"></p>
        </form>
    </div>

    <script src="/javascript/cadastroGenero.js"></script>

</body>
</html>
